name: CI

on:
  pull_request:
  push:
    branches: [main, "feat/**", "fix/**", "refactor/**"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/yommi_ci?schema=public
      JWT_SECRET: ci_only_placeholder_secret_at_least_32_chars
      API_URL: http://localhost:3001
      CORS_ORIGINS: http://localhost:5173
      VITE_API_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - run: npm run prisma:validate
      - run: npm run prisma:generate