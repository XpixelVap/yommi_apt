services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: yommi_local
      POSTGRES_PASSWORD: local_only_change_me
      POSTGRES_DB: yommi
    ports:
      - "5432:5432"
    volumes:
      - yommi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yommi_local -d yommi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  yommi_postgres_data: